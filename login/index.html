<html>

<head>
    <title>Login</title>
</head>

<body>
    <div class="first-page">
        <div class="container">
            <h1 class="judul">Login</h1>
            <form class="form" onsubmit="checking(event)">
                <p>
                    <input type="text" id="username" class="username" placeholder="username">
                </p>
                <p>
                    <input type="password" id="password" class="password" placeholder="password">
                </p>
                <p>
                    <label><input type="checkbox" id="remember" class="remember">remember username</label>
                </p>

                <button onclick="checking()" class="login">login</button>
            </form>
        </div>
    </div>

</body>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

</html>
